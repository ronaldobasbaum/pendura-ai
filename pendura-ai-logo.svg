<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="520" height="200">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <!-- Orange accent gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6a00"/>
      <stop offset="100%" style="stop-color:#ff4d00"/>
    </linearGradient>
    <!-- Tag gradient -->
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#ff4d00"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#ff4d00" flood-opacity="0.35"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="520" height="200" rx="22" ry="22" fill="url(#bgGrad)"/>

  <!-- Subtle dot grid texture -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="1" fill="#ffffff" fill-opacity="0.04"/>
  </pattern>
  <rect width="520" height="200" rx="22" ry="22" fill="url(#dots)"/>

  <!-- ===== ICON: Hang tag with string ===== -->
  <!-- String / rope from top -->
  <path d="M 72 14 Q 78 35 72 52" stroke="#ffb800" stroke-width="2.5" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- Small hook at top -->
  <path d="M 68 14 Q 72 8 76 14" stroke="#ffb800" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Tag body (tilted slightly) -->
  <g transform="rotate(-8, 72, 100)" filter="url(#shadow)">
    <rect x="38" y="52" width="68" height="88" rx="10" ry="10" fill="url(#tagGrad)"/>
    <!-- Tag hole -->
    <circle cx="72" cy="66" r="5.5" fill="#1a1a1a"/>
    <!-- Tag lines (simulating text on tag) -->
    <rect x="50" y="80" width="44" height="5" rx="2.5" fill="#fff" fill-opacity="0.4"/>
    <rect x="50" y="92" width="34" height="5" rx="2.5" fill="#fff" fill-opacity="0.3"/>
    <rect x="50" y="104" width="39" height="5" rx="2.5" fill="#fff" fill-opacity="0.3"/>
    <!-- Dollar sign on tag -->
    <text x="72" y="135" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#fff" fill-opacity="0.85">R$</text>
  </g>

  <!-- Small star/sparkle accents -->
  <g fill="#ffb800" fill-opacity="0.9">
    <!-- Star top-right of icon -->
    <polygon points="110,28 112,23 114,28 119,30 114,32 112,37 110,32 105,30" transform="scale(0.7) translate(45, 15)"/>
    <!-- Tiny star -->
    <polygon points="28,80 29.5,75 31,80 36,81.5 31,83 29.5,88 28,83 23,81.5" transform="scale(0.5) translate(10, 10)"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <!-- "Pendura" -->
  <text
    x="148" y="105"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="58"
    font-weight="900"
    letter-spacing="-1"
    fill="#f0ede8"
    filter="url(#softShadow)"
  >Pendura</text>

  <!-- "Aí" with orange accent + underline squiggle -->
  <text
    x="148" y="158"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="58"
    font-weight="900"
    letter-spacing="2"
    fill="url(#orangeGrad)"
    filter="url(#shadow)"
  >Aí!</text>

  <!-- Fun squiggly underline under "Aí!" -->
  <path
    d="M 148 168 Q 163 175 178 168 Q 193 161 208 168 Q 218 173 228 168"
    stroke="#ffb800" stroke-width="3" stroke-linecap="round" fill="none"
    filter="url(#glow)"
  />

  <!-- Tagline -->
  <text
    x="152" y="186"
    font-family="'Arial', sans-serif"
    font-size="12"
    font-weight="400"
    letter-spacing="3"
    fill="#888888"
  >CONTROLE DE VENDAS A PRAZO</text>

  <!-- Decorative accent line on right -->
  <line x1="490" y1="40" x2="490" y2="160" stroke="#ff4d00" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="498" y1="60" x2="498" y2="140" stroke="#ffb800" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
